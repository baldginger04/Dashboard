<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Invoices · Bald Ginger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1B2A4B; --orange:#C8511A; --amber:#EFA02A; --coral:#D85B31;
    --ink:#1d2433; --muted:#6b7383; --line:#e7e9ee; --bg:#f6f7f9; --card:#fff;
    --good:#1f9d6b; --good-bg:#e7f6ef; --warn:#9a5b00; --warn-bg:#fdf1dc;
    --dup:#b4321f; --dup-bg:#fbe6e2; --info:#215a9e; --info-bg:#e6eefa;
    --done:#4a5568; --done-bg:#eef0f4;
    --disp:'Hanken Grotesk',system-ui,sans-serif; --body:'Inter',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--body);color:var(--ink);background:var(--bg);font-size:14px}
  h1,h2,h3,.disp{font-family:var(--disp)}
  .top{background:var(--navy);color:#fff;padding:0 22px;height:58px;display:flex;align-items:center;gap:14px}
  .top .mark{width:26px;height:26px;border-radius:6px;background:linear-gradient(135deg,var(--orange),var(--amber))}
  .top h1{font-size:17px;margin:0;font-weight:800}
  .top .sub{color:#aab4c8;font-size:12px}
  .top .right{margin-left:auto;display:flex;align-items:center;gap:14px}
  .me{color:#aab4c8;font-size:12px}
  /* client switcher */
  .switcher{position:relative}
  .sw-btn{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);
          color:#fff;border-radius:9px;padding:7px 12px;font-family:var(--disp);font-weight:600;font-size:13.5px;cursor:pointer}
  .sw-btn:hover{background:rgba(255,255,255,.14)}
  .sw-btn .pin{color:var(--amber)}
  .sw-btn .car{color:#aab4c8;font-size:11px}
  .sw-pop{position:absolute;top:44px;right:0;width:280px;background:#fff;color:var(--ink);border:1px solid var(--line);
          border-radius:12px;box-shadow:0 12px 34px rgba(20,30,55,.22);z-index:40;overflow:hidden;display:none}
  .sw-pop.open{display:block}
  .sw-search{padding:10px}
  .sw-search input{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:13.5px;font-family:var(--body)}
  .sw-list{max-height:320px;overflow:auto;padding-bottom:6px}
  .sw-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;font-size:13.5px}
  .sw-item:hover{background:#fbfaf8}
  .sw-item.on{background:#fbe7db}
  .sw-item .dot{width:8px;height:8px;border-radius:50%;background:var(--orange);opacity:0}
  .sw-item.on .dot{opacity:1}
  .sw-item .nm{font-weight:600}

  .wrap{max-width:1140px;margin:0 auto;padding:20px 22px 70px}
  .tabs{display:flex;gap:4px;flex-wrap:wrap;border-bottom:1px solid var(--line);margin-bottom:16px}
  .tab{border:0;background:none;font-family:var(--disp);font-weight:600;font-size:13.5px;color:var(--muted);
       padding:9px 14px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
  .tab:hover{color:var(--ink)}
  .tab.on{color:var(--orange);border-bottom-color:var(--orange)}
  .tab .n{display:inline-block;min-width:18px;margin-left:6px;padding:1px 6px;border-radius:9px;background:var(--done-bg);
          color:var(--done);font-size:11px;font-family:var(--body);font-weight:600}
  .tab.on .n{background:#fbe7db;color:var(--orange)}

  select,button,input{font-family:var(--body);font-size:13.5px}
  .btn{border:1px solid var(--line);background:#fff;color:var(--ink);padding:8px 13px;border-radius:8px;cursor:pointer;font-weight:600}
  .btn:hover{border-color:#cfd3dc}
  .btn.pri{background:var(--orange);border-color:var(--orange);color:#fff}
  .btn.pri:hover{background:#b3480f}
  .btn.pri:disabled{background:#e3c3ad;border-color:#e3c3ad;cursor:not-allowed}
  .btn.danger{color:var(--dup);border-color:#eccbc4}
  .btn.danger:hover{background:var(--dup-bg)}
  .btn.sm{padding:6px 10px;font-size:12.5px}

  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-family:var(--disp);font-weight:600;font-size:12px;color:var(--muted);text-transform:uppercase;
     letter-spacing:.4px;padding:11px 14px;border-bottom:1px solid var(--line);background:#fbfbfc}
  td{padding:12px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
  tr:last-child td{border-bottom:0}
  tbody tr.click{cursor:pointer}
  tbody tr.click:hover{background:#fbfaf8}
  .vendor{font-weight:600}.mono{font-variant-numeric:tabular-nums}.r{text-align:right}.dim{color:var(--muted)}
  .badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11.5px;font-weight:600;font-family:var(--disp)}
  .b-review{background:var(--warn-bg);color:var(--warn)}.b-ready{background:var(--info-bg);color:var(--info)}
  .b-approved{background:var(--good-bg);color:var(--good)}.b-duplicate{background:var(--dup-bg);color:var(--dup)}
  .b-pushed{background:var(--done-bg);color:var(--done)}.b-error{background:var(--dup-bg);color:var(--dup)}
  .pill{font-size:11.5px;color:var(--muted);font-variant-numeric:tabular-nums}.pill b{color:var(--good)}

  .back{background:none;border:0;color:var(--orange);font-weight:600;cursor:pointer;padding:0;font-size:13.5px}
  .meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px 22px;margin:10px 0 4px}
  .meta div small{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.4px}
  .meta div span{font-weight:600;font-size:14px}
  .foot{padding:9px 12px;border-radius:8px;font-size:13px;font-weight:600;display:inline-flex;gap:8px;align-items:center}
  .foot.ok{background:var(--good-bg);color:var(--good)}.foot.bad{background:var(--dup-bg);color:var(--dup)}
  .acctsel{padding:6px 8px;border:1px solid var(--line);border-radius:7px;background:#fff;min-width:230px;max-width:280px}
  tr.needs td{background:#fffdf7}tr.charge td{background:#f7f9fc}
  .tag{font-size:10.5px;font-weight:700;color:var(--amber);letter-spacing:.5px}
  .coded{font-weight:600}.coded small{color:var(--muted);font-weight:400}
  .bulk{display:flex;gap:8px;align-items:center;margin:2px 0 12px;flex-wrap:wrap}
  .empty{padding:48px 20px;text-align:center;color:var(--muted)}
  .empty .disp{font-size:16px;color:var(--ink);margin-bottom:6px}
  .warnbar{background:var(--warn-bg);color:var(--warn);border:1px solid #f0d9ab;border-radius:8px;padding:9px 12px;font-size:13px;margin-bottom:14px}
  .note{font-size:12.5px;color:var(--muted)}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:11px 18px;
         border-radius:10px;font-size:13.5px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:50}
  .toast.show{opacity:1}
  .spin{display:inline-block;width:15px;height:15px;border:2px solid #d9dce3;border-top-color:var(--orange);border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
  <div class="top">
    <span class="mark"></span>
    <h1>Invoices</h1><span class="sub">Bald Ginger · AP queue</span>
    <div class="right">
      <div class="switcher" id="switcher"></div>
      <span class="me" id="me"></span>
    </div>
  </div>
  <div class="wrap"><div id="app"><div class="empty"><span class="spin"></span> Loading…</div></div></div>
  <div class="toast" id="toast"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const SUPABASE_URL='https://evfemokwtofbarjeezhu.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV2ZmVtb2t3dG9mYmFyamVlemh1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NDUxMjQsImV4cCI6MjA5NTEyMTEyNH0.B9OSeB9CEP0TX80dJWpBPAIP6IEhYIzYlYKe4WL-6B0';
const sb = createClient(SUPABASE_URL, SUPABASE_ANON, { auth:{ persistSession:true, autoRefreshToken:true } });

async function adoptTripleSession(){
  try{ const { data:{ session } } = await sb.auth.getSession(); if(session) return true; }catch{}
  function readStored(){
    const d = localStorage.getItem('triple-auth'); if(d) return d;
    const keys = Object.keys(localStorage).filter(k=>/sb-.*-auth-token(\.\d+)?$/.test(k)).sort();
    return keys.length ? keys.map(k=>localStorage.getItem(k)||'').join('') : null;
  }
  try{
    const raw = readStored(); if(!raw) return false;
    let text = raw.startsWith('base64-') ? atob(raw.slice(7)) : raw;
    const p = JSON.parse(text);
    const at = p.access_token || p.currentSession?.access_token, rt = p.refresh_token || p.currentSession?.refresh_token;
    if(!at||!rt) return false;
    const { data, error } = await sb.auth.setSession({ access_token:at, refresh_token:rt });
    return !!(data?.session && !error);
  }catch(e){ return false; }
}

const TABS=[
  {key:'needs_review',label:'Needs Review',where:['needs_review']},
  {key:'pending',label:'Ready',where:['pending']},
  {key:'approved',label:'Approved',where:['approved']},
  {key:'duplicate',label:'Duplicates',where:['duplicate']},
  {key:'pushed',label:'Pushed',where:['pushed']},
  {key:'all',label:'All',where:null},
];
const BADGE={needs_review:['b-review','Needs review'],pending:['b-ready','Ready'],approved:['b-approved','Approved'],
  duplicate:['b-duplicate','Duplicate'],pushed:['b-pushed','Pushed'],error:['b-error','Error']};
const CLIENT_KEY='bg_inv_client';

const state={ me:null, tab:'needs_review', client:localStorage.getItem(CLIENT_KEY)||'', clients:{}, counts:{}, acctCache:{}, swOpen:false };
const app=document.getElementById('app');
const money=n=>(n==null?'—':'$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}));
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

(async function boot(){
  await adoptTripleSession();
  const { data:{ user } } = await sb.auth.getUser();
  if(!user){ app.innerHTML=`<div class="empty"><div class="disp">Nothing to show</div>You’re not signed in. Open Triple in another tab, log in, then reload.</div>`; return; }
  const { data:prof } = await sb.from('profiles').select('is_team,full_name').eq('id',user.id).maybeSingle();
  if(!prof?.is_team){ app.innerHTML=`<div class="empty"><div class="disp">Team only</div>This queue is for the Bald Ginger team.</div>`; return; }
  state.me=user; document.getElementById('me').textContent=prof.full_name||user.email;
  const { data:cl } = await sb.from('clients').select('id,name').order('name');
  (cl||[]).forEach(c=>state.clients[c.id]=c.name);
  if(state.client && !state.clients[state.client]) state.client='';   // stale pick
  renderSwitcher();
  await refresh();
})();

// ---------- client switcher ----------
function renderSwitcher(){
  const el=document.getElementById('switcher');
  const label = state.client ? (state.clients[state.client]||'Client') : 'All clients';
  const items = [['','All clients']].concat(Object.entries(state.clients).sort((a,b)=>a[1].localeCompare(b[1])));
  el.innerHTML=`
    <button class="sw-btn" id="swBtn"><span class="pin">◉</span> ${esc(label)} <span class="car">▾</span></button>
    <div class="sw-pop ${state.swOpen?'open':''}" id="swPop">
      <div class="sw-search"><input id="swSearch" placeholder="Find client…" autocomplete="off"></div>
      <div class="sw-list" id="swList">
        ${items.map(([id,n])=>`<div class="sw-item ${id===state.client?'on':''}" data-id="${id}"><span class="dot"></span><span class="nm">${esc(n)}</span></div>`).join('')}
      </div>
    </div>`;
  document.getElementById('swBtn').onclick=(e)=>{ e.stopPropagation(); state.swOpen=!state.swOpen; renderSwitcher(); if(state.swOpen) setTimeout(()=>document.getElementById('swSearch')?.focus(),0); };
  if(state.swOpen){
    const search=document.getElementById('swSearch');
    search.oninput=()=>{ const q=search.value.toLowerCase(); document.querySelectorAll('#swList .sw-item').forEach(it=>{ it.style.display = it.textContent.toLowerCase().includes(q)?'':'none'; }); };
    document.querySelectorAll('#swList .sw-item').forEach(it=>it.onclick=async()=>{
      state.client=it.dataset.id; localStorage.setItem(CLIENT_KEY,state.client); state.swOpen=false;
      renderSwitcher(); await refresh();
    });
  }
}
document.addEventListener('click',()=>{ if(state.swOpen){ state.swOpen=false; renderSwitcher(); } });

// ---------- list ----------
async function refresh(){ await loadCounts(); await renderList(); }
async function loadCounts(){
  const counts={};
  await Promise.all(TABS.filter(t=>t.where).map(async t=>{
    let q=sb.from('invoice_queue').select('id',{count:'exact',head:true}).in('status',t.where);
    if(state.client) q=q.eq('client_id',state.client);
    const { count }=await q; counts[t.key]=count||0;
  }));
  state.counts=counts;
}
async function renderList(){
  const tab=TABS.find(t=>t.key===state.tab);
  let q=sb.from('invoice_queue').select('id,client_id,vendor,invoice_number,invoice_date,total,status,source,qbo_bill_id,created_at')
    .order('created_at',{ascending:false}).limit(300);
  if(tab.where) q=q.in('status',tab.where);
  if(state.client) q=q.eq('client_id',state.client);
  const { data:rows, error }=await q;

  const tabsHtml=TABS.map(t=>`<button class="tab ${t.key===state.tab?'on':''}" data-tab="${t.key}">${t.label}${t.where?`<span class="n">${state.counts[t.key]??''}</span>`:''}</button>`).join('');
  let body;
  if(error) body=`<div class="empty">Couldn’t load: ${esc(error.message)}</div>`;
  else if(!rows.length) body=emptyFor(state.tab);
  else body=`<div class="card"><table>
      <thead><tr><th>Vendor</th><th>Invoice #</th><th>Date</th><th class="r">Total</th>${state.client?'':'<th>Client</th>'}<th>Coded</th><th>Status</th></tr></thead>
      <tbody>${rows.map(rowHtml).join('')}</tbody></table></div>`;

  app.innerHTML=`<div class="tabs">${tabsHtml}</div>${body}`;
  document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{ state.tab=b.dataset.tab; renderList(); });
  document.querySelectorAll('tr.click').forEach(tr=>tr.onclick=()=>openInvoice(tr.dataset.id));
  if(rows&&rows.length) fillCoded(rows.map(r=>r.id));
}
function rowHtml(r){
  const [b,label]=BADGE[r.status]||['b-ready',r.status];
  return `<tr class="click" data-id="${r.id}">
    <td class="vendor">${esc(r.vendor||'—')}</td>
    <td class="mono dim">${esc(r.invoice_number||'—')}</td>
    <td class="dim">${esc(r.invoice_date||'—')}</td>
    <td class="r mono">${money(r.total)}</td>
    ${state.client?'':`<td class="dim">${esc(state.clients[r.client_id]||'—')}</td>`}
    <td><span class="pill" data-coded="${r.id}">—</span></td>
    <td><span class="badge ${b}">${label}</span>${r.status==='duplicate'&&r.qbo_bill_id?` <span class="dim" style="font-size:11px">in QBO #${esc(r.qbo_bill_id)}</span>`:''}</td>
  </tr>`;
}
function emptyFor(tab){
  const m={needs_review:'Nothing waiting on you.',pending:'Nothing ready to approve.',approved:'Nothing approved and waiting.',
    duplicate:'No duplicates flagged.',pushed:'Nothing posted to QBO yet.',all:'No invoices yet.'}[tab]||'Nothing here.';
  return `<div class="empty"><div class="disp">All clear</div>${m}</div>`;
}
async function fillCoded(ids){
  const { data }=await sb.from('invoice_lines').select('invoice_id,needs_review,is_charge').in('invoice_id',ids);
  const g={}; (data||[]).forEach(l=>{ const o=g[l.invoice_id]??(g[l.invoice_id]={t:0,c:0}); if(!l.is_charge){o.t++; if(!l.needs_review)o.c++;} });
  ids.forEach(id=>{ const el=document.querySelector(`[data-coded="${id}"]`); if(!el)return; const o=g[id]; if(!o){el.textContent='—';return;} el.innerHTML=(o.c===o.t)?`<b>${o.c}/${o.t}</b>`:`${o.c}/${o.t}`; });
}

// ---------- accounts (QBO if linked, else gl_names) ----------
async function getAccounts(clientId){
  if(state.acctCache[clientId]) return state.acctCache[clientId];
  let res={ connected:false, options:[], nameByCode:{}, byId:{} };
  try{
    const { data, error } = await sb.functions.invoke('qbo-accounts',{ body:{ client_id:clientId } });
    if(!error && data?.ok){
      res.connected=true;
      res.options=data.accounts.map(a=>({ value:a.acct_num||a.id, id:a.id, label:a.label, code:a.acct_num }));
      data.accounts.forEach(a=>{ res.byId[a.acct_num||a.id]=a; if(a.acct_num) res.nameByCode[a.acct_num]=a.name; });
    }
  }catch(e){}
  if(!res.connected){
    const { data } = await sb.from('gl_names').select('gl_code,gl_name').eq('client_id',clientId);
    (data||[]).forEach(r=>res.nameByCode[r.gl_code]=r.gl_name);
    // also include any codes present in item_map that lack a name row
    const { data:codes } = await sb.from('item_map').select('gl_account').eq('client_id',clientId).limit(3000);
    const set=new Set((codes||[]).map(r=>r.gl_account));
    Object.keys(res.nameByCode).forEach(c=>set.add(c));
    res.options=[...set].sort((a,b)=>String(a).localeCompare(String(b),undefined,{numeric:true}))
      .map(c=>({ value:c, id:null, code:c, label: res.nameByCode[c]?`${c} · ${res.nameByCode[c]}`:c }));
  }
  state.acctCache[clientId]=res; return res;
}
function accountLabel(acct, code){
  if(!code) return '—';
  if(acct.byId?.[code]) return acct.byId[code].label;
  return acct.nameByCode[code] ? `${code} · ${acct.nameByCode[code]}` : code;
}

// ---------- detail ----------
async function openInvoice(id){
  app.innerHTML=`<div class="empty"><span class="spin"></span> Opening…</div>`;
  const { data:inv }=await sb.from('invoice_queue').select('*').eq('id',id).single();
  const { data:lines }=await sb.from('invoice_lines').select('*').eq('invoice_id',id).order('line_number');
  const acct=await getAccounts(inv.client_id);
  renderDetail(inv, lines||[], acct);
}
function renderDetail(inv, lines, acct){
  const products=lines.filter(l=>!l.is_charge), charges=lines.filter(l=>l.is_charge);
  const lineSum=lines.reduce((s,l)=>s+(Number(l.amount)||0),0);
  const grand=Math.round((lineSum+(Number(inv.tax)||0))*100)/100;
  const foots=inv.total!=null?Math.abs(grand-Number(inv.total))<0.01:null;
  const openReview=lines.filter(l=>l.needs_review).length;
  const [b,label]=BADGE[inv.status]||['b-ready',inv.status];
  const optsFor=sel=>`<option value="">Select account…</option>`+acct.options.map(o=>`<option value="${o.value}" ${o.value===sel?'selected':''}>${esc(o.label)}</option>`).join('');
  const lineRow=l=>{
    const cls=l.needs_review?'needs':(l.is_charge?'charge':'');
    const cell=l.needs_review
      ? `<select class="acctsel" data-line="${l.id}" data-mk="${esc(l.match_key||'')}">${optsFor(l.final_account)}</select>`
      : `<span class="coded">${esc(accountLabel(acct,l.final_account))}</span>`;
    return `<tr class="${cls}">
      <td class="dim mono">${l.line_number}</td>
      <td>${esc(l.raw_description||'—')}${l.is_charge?' <span class="tag">CHARGE</span>':''}${l.vendor_item_code?`<br><small class="dim mono">${esc(l.vendor_item_code)}</small>`:''}</td>
      <td class="r mono dim">${l.quantity??''}</td>
      <td class="r mono">${money(l.amount)}</td>
      <td>${cell}</td></tr>`;
  };
  const notConn = !acct.connected ? `<div class="warnbar">QuickBooks isn’t linked for this client yet — accounts shown from your chart names; codes still save. Link it in Statement Reconciler to resolve to live QBO accounts.</div>`:'';
  const bulk = openReview>0 ? `<div class="bulk"><span class="note">Bulk:</span>
      <select class="acctsel" id="bulkSel">${optsFor('')}</select>
      <button class="btn sm" id="bulkApply">Apply to all uncoded</button></div>`:'';

  app.innerHTML=`
    <button class="back" id="back">← Back to queue</button>
    ${notConn}
    <h2 style="margin:.3em 0">${esc(inv.vendor||'—')} <span class="badge ${b}" style="vertical-align:middle">${label}</span></h2>
    <div class="meta">
      <div><small>Invoice #</small><span class="mono">${esc(inv.invoice_number||'—')}</span></div>
      <div><small>Date</small><span>${esc(inv.invoice_date||'—')}</span></div>
      <div><small>Client</small><span>${esc(state.clients[inv.client_id]||'—')}</span></div>
      <div><small>Source</small><span>${esc(inv.source||'—')}</span></div>
      <div><small>Subtotal</small><span class="mono">${money(inv.subtotal)}</span></div>
      <div><small>Tax</small><span class="mono">${money(inv.tax)}</span></div>
      <div><small>Total</small><span class="mono">${money(inv.total)}</span></div>
    </div>
    <div style="margin:8px 0 12px">${foots===null?'':foots?`<span class="foot ok">✓ Balances — lines + tax = ${money(grand)}</span>`:`<span class="foot bad">✕ Off by ${money(Math.abs(grand-Number(inv.total)))} — computed ${money(grand)} vs ${money(inv.total)}</span>`}</div>
    ${bulk}
    <div class="card"><table>
      <thead><tr><th>#</th><th>Item</th><th class="r">Qty</th><th class="r">Amount</th><th>GL account</th></tr></thead>
      <tbody>${products.map(lineRow).join('')}${charges.map(lineRow).join('')}</tbody></table></div>
    <div class="bulk" style="margin-top:16px">
      <button class="btn pri" id="save">Save coding</button>
      <button class="btn" id="approve" ${(openReview>0||foots===false)?'disabled':''}>Approve for QBO</button>
      ${inv.status==='duplicate'?`<button class="btn danger" id="del">Delete duplicate</button>`:''}
      <span class="note">${openReview>0?`${openReview} line${openReview>1?'s':''} still need an account.`:'All lines coded — ready to approve.'}</span>
    </div>`;

  document.getElementById('back').onclick=()=>renderList();
  document.getElementById('save').onclick=()=>saveCoding(inv);
  const ap=document.getElementById('approve'); if(ap) ap.onclick=()=>approve(inv, lines, acct);
  const del=document.getElementById('del'); if(del) del.onclick=()=>deleteInvoice(inv);
  const ba=document.getElementById('bulkApply'); if(ba) ba.onclick=()=>{ const v=document.getElementById('bulkSel').value; if(!v)return;
    document.querySelectorAll('select[data-line]').forEach(s=>{ if(!s.value) s.value=v; }); };
}

// ---------- save (stay on invoice, re-render in place) ----------
async function saveCoding(inv){
  const sels=[...document.querySelectorAll('select[data-line]')];
  const lineUpdates=[], mapRows=[];
  const acct=await getAccounts(inv.client_id);
  for(const s of sels){
    const code=s.value; if(!code) continue;
    const qbo_id=acct.byId?.[code]?.id||null;
    lineUpdates.push({id:s.dataset.line,final_account:code,qbo_account_id:qbo_id});
    if(s.dataset.mk) mapRows.push({client_id:inv.client_id,vendor:inv.vendor,match_key:s.dataset.mk,gl_account:code,qbo_account_id:qbo_id,updated_at:new Date().toISOString()});
  }
  if(!lineUpdates.length){ toast('Pick an account first.'); return; }
  const btn=document.getElementById('save'); btn.innerHTML='<span class="spin"></span> Saving…'; btn.disabled=true;
  for(const u of lineUpdates) await sb.from('invoice_lines').update({final_account:u.final_account,qbo_account_id:u.qbo_account_id,needs_review:false}).eq('id',u.id);
  if(mapRows.length) await sb.from('item_map').upsert(mapRows,{onConflict:'client_id,vendor,match_key'});
  const { data:rem }=await sb.from('invoice_lines').select('id').eq('invoice_id',inv.id).eq('needs_review',true).limit(1);
  const status=(rem&&rem.length)?'needs_review':'pending';
  await sb.from('invoice_queue').update({status}).eq('id',inv.id);
  toast(mapRows.length?`Saved — ${mapRows.length} item${mapRows.length>1?'s':''} learned.`:'Saved.');
  await loadCounts();                       // keep tab counts live
  openInvoice(inv.id);                       // re-render detail in place; Approve lights up when ready
}

// ---------- approve (leaves to list, counts refresh) ----------
async function approve(inv, lines, acct){
  if(acct.connected){
    for(const l of lines){ if(!l.qbo_account_id && l.final_account && acct.byId?.[l.final_account]) await sb.from('invoice_lines').update({qbo_account_id:acct.byId[l.final_account].id}).eq('id',l.id); }
  }
  await sb.from('invoice_queue').update({status:'approved',approved_at:new Date().toISOString()}).eq('id',inv.id);
  toast('Approved — queued for the QBO push.');
  state.tab='approved';                       // show where it went
  await refresh();
}

async function deleteInvoice(inv){
  if(!confirm(`Delete this duplicate?\n${inv.vendor} · ${inv.invoice_number||'no #'} · ${money(inv.total)}\nRemoves it from the queue; the QBO bill is untouched.`)) return;
  await sb.from('invoice_queue').delete().eq('id',inv.id);
  toast('Duplicate removed.'); await refresh();
}
</script>
</body>
</html>
