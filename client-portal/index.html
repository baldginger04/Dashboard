<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bald Ginger — Client Portal</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- ================= LOGIN ================= -->
  <div id="loginScreen">
    <div class="login-card">
      <img src="../assets/Bald-Ginger_Color_HORZ.png" alt="Bald Ginger" class="login-logo" />
      <div class="login-sub">Client Portal</div>

      <form id="loginForm">
        <div class="field">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" autocomplete="email" required />
        </div>
        <div class="field">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" autocomplete="current-password" required />
        </div>
        <button type="submit" class="login-btn" id="loginBtn">Sign in</button>
        <div class="login-err" id="loginErr"></div>
      </form>
    </div>
  </div>

  <!-- ================= APP SHELL ================= -->
  <div id="appShell">
    <div class="shell">

      <!-- SIDEBAR -->
      <aside class="sidebar">
        <div class="sidebar-logo">
          <img src="../assets/Bald-Ginger_Color_HORZ.png" alt="Bald Ginger" />
        </div>

        <div class="client-switcher">
          <div class="client-switcher-label">Viewing</div>
          <select id="clientSelect"></select>
        </div>

        <div class="sidebar-user">
          <div class="user-avatar" id="userAvatar">?</div>
          <div class="user-info">
            <div class="user-name" id="userName">—</div>
            <div class="user-role" id="userRole">—</div>
          </div>
        </div>

        <nav class="sidebar-nav">
          <div class="nav-section">Workspace</div>
          <div class="nav-item active">💬 Messages</div>
        </nav>

        <div class="sidebar-footer">
          <button class="logout-btn" id="logoutBtn">Sign out</button>
        </div>
      </aside>

      <!-- MAIN -->
      <main class="main">
        <header class="page-header">
          <h1 class="page-title" id="pageTitle">Messages</h1>
          <div class="page-sub" id="pageSub"></div>
        </header>

        <!-- No clients state -->
        <div class="no-clients" id="noClientsState" style="display:none">
          You don't have access to any clients yet. Please reach out to your contact at Bald Ginger to get connected.
        </div>

        <!-- Messages page -->
        <section class="card" id="messagesPage" style="display:none">
          <div class="msg-list" id="msgList"></div>

          <div class="composer">
            <textarea
              id="composerInput"
              placeholder="Write a message… (Enter to send, Shift+Enter for new line)"
              rows="1"
            ></textarea>
            <button class="btn btn-primary" id="composerSend">Send</button>
          </div>
        </section>
      </main>

    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
