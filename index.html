<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invoice Automation Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0d0f0e;
      --bg2:       #141714;
      --bg3:       #1a1e1a;
      --border:    #2a2e2a;
      --border2:   #222622;
      --text:      #e8ece8;
      --text2:     #8a9a8a;
      --text3:     #556055;
      --green:     #4ade80;
      --green-bg:  #0d2016;
      --red:       #f87171;
      --red-bg:    #200d0d;
      --yellow:    #fbbf24;
      --yellow-bg: #1e1608;
      --blue:      #60a5fa;
      --blue-bg:   #0d1520;
      --accent:    #4ade80;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      min-height: 100vh;
      padding: 0;
    }

    /* ── HEADER ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }
    .logo {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .logo span { color: var(--text3); }
    header .spacer { flex: 1; }
    .header-meta {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--text3);
    }
    #refreshBtn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 6px 14px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      transition: all .15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #refreshBtn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── CONFIG BAR ── */
    #configBar {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    #configBar label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: .06em;
      white-space: nowrap;
    }
    #configBar input {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      padding: 7px 10px;
      border-radius: 4px;
      outline: none;
      transition: border-color .15s;
    }
    #configBar input:focus { border-color: var(--accent); }
    #tokenInput { max-width: 180px; flex: none; }
    #loadBtn {
      background: var(--accent);
      color: #0a1a0a;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      padding: 7px 18px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity .15s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #loadBtn:hover { opacity: .85; }
    #saveUrlBtn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text2);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 7px 12px;
      border-radius: 4px;
      cursor: pointer;
      white-space: nowrap;
      transition: all .15s;
    }
    #saveUrlBtn:hover { border-color: var(--accent); color: var(--accent); }
    .saved-notice {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      opacity: 0;
      transition: opacity .3s;
    }
    .saved-notice.show { opacity: 1; }

    /* ── METRICS ── */
    .metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border2);
      border-bottom: 1px solid var(--border);
    }
    .metric {
      background: var(--bg);
      padding: 1.25rem 2rem;
    }
    .metric-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--text3);
      margin-bottom: 6px;
    }
    .metric-value {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 28px;
      font-weight: 500;
      line-height: 1;
    }
    .metric-value.green { color: var(--green); }
    .metric-value.red   { color: var(--red); }
    .metric-value.yellow{ color: var(--yellow); }
    .metric-value.white { color: var(--text); }

    /* ── FILTERS ── */
    .filters {
      padding: .75rem 2rem;
      display: flex;
      gap: 8px;
      align-items: center;
      border-bottom: 1px solid var(--border2);
      flex-wrap: wrap;
    }
    .filters-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text3);
      margin-right: 4px;
    }
    .filters select {
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text2);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 5px 10px;
      border-radius: 4px;
      outline: none;
      cursor: pointer;
    }
    .filters select:focus { border-color: var(--accent); }
    .filter-count {
      margin-left: auto;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--text3);
    }

    /* ── TABLE ── */
    .table-wrap {
      overflow-x: auto;
      padding: 0 2rem 2rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }
    thead th {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--text3);
      padding: 0 12px 10px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid var(--border2);
      transition: background .1s;
    }
    tbody tr:hover { background: var(--bg2); }
    tbody tr:last-child { border-bottom: none; }
    td {
      padding: 11px 12px;
      vertical-align: middle;
      font-size: 13px;
    }
    .td-name {
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
    }
    .td-vendor {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--text3);
      white-space: nowrap;
    }
    .td-client { color: var(--text2); white-space: nowrap; }
    .td-time {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--text2);
      white-space: nowrap;
    }
    .td-sched {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--text3);
      margin-top: 2px;
    }
    .td-age {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
    }
    .td-reason {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── BADGES ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: .05em;
      white-space: nowrap;
    }
    .badge-ok       { background: var(--green-bg);  color: var(--green);  border: 1px solid #1a4028; }
    .badge-fail     { background: var(--red-bg);    color: var(--red);    border: 1px solid #3a1515; }
    .badge-warn     { background: var(--yellow-bg); color: var(--yellow); border: 1px solid #3a2a08; }
    .badge-running  { background: var(--blue-bg);   color: var(--blue);   border: 1px solid #0d2540; }
    .badge-gray     { background: var(--bg3);       color: var(--text3);  border: 1px solid var(--border); }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .dot-pulse {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--blue);
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: .4; transform: scale(.8); }
    }

    /* ── ERROR LINK ── */
    .err-btn {
      background: none;
      border: none;
      color: var(--red);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      text-align: left;
      padding: 0;
      text-decoration: underline;
      text-decoration-style: dotted;
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      display: block;
    }

    /* ── EMPTY / LOADING ── */
    .state-box {
      text-align: center;
      padding: 5rem 2rem;
      color: var(--text3);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
    }
    .state-box .big { font-size: 32px; margin-bottom: 1rem; }
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MODAL ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.5rem;
      max-width: 540px;
      width: 92%;
    }
    .modal h3 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      color: var(--red);
      margin-bottom: 1rem;
      font-weight: 500;
    }
    .modal pre {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: .75rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--text2);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 220px;
      overflow-y: auto;
      line-height: 1.6;
    }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 1rem;
    }
    .modal-btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 7px 14px;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      transition: all .15s;
    }
    .modal-btn:hover { border-color: var(--text2); color: var(--text); }
    .modal-btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #0a1a0a;
      font-weight: 500;
    }
    .modal-btn-primary:hover { opacity: .85; }
  </style>
</head>
<body>

  <header>
    <div class="logo">Bald<span>/</span>Ginger <span>//</span> Invoice Automation</div>
    <div class="spacer"></div>
    <div class="header-meta" id="updatedAt"></div>
    <button id="refreshBtn" onclick="loadData()">
      <span id="refreshSpinner" style="display:none" class="spinner"></span>
      ↻ Refresh
    </button>
  </header>

  <div id="configBar">
    <label>Script URL</label>
    <input type="text" id="scriptUrl" placeholder="https://script.google.com/macros/s/.../exec" />
    <input type="text" id="tokenInput" placeholder="token (optional)" />
    <button id="saveUrlBtn" onclick="saveUrl()">Save URL</button>
    <span class="saved-notice" id="savedNotice">Saved ✓</span>
    <button id="loadBtn" onclick="loadData()">
      <span id="loadSpinner" style="display:none" class="spinner"></span>
      Load
    </button>
  </div>

  <div class="metrics">
    <div class="metric">
      <div class="metric-label">Total Workflows</div>
      <div class="metric-value white" id="m-total">—</div>
    </div>
    <div class="metric">
      <div class="metric-label">Completed</div>
      <div class="metric-value green" id="m-ok">—</div>
    </div>
    <div class="metric">
      <div class="metric-label">Failed / Terminated</div>
      <div class="metric-value red" id="m-fail">—</div>
    </div>
    <div class="metric">
      <div class="metric-label">Stale / Not Run</div>
      <div class="metric-value yellow" id="m-stale">—</div>
    </div>
  </div>

  <div class="filters">
    <span class="filters-label">Filter</span>
    <select id="fStatus" onchange="render()">
      <option value="all">All statuses</option>
      <option value="completed">Completed</option>
      <option value="failed">Failed</option>
      <option value="terminated">Terminated</option>
      <option value="running">Running</option>
      <option value="stale">Stale / not run</option>
    </select>
    <select id="fVendor" onchange="render()"><option value="all">All vendors</option></select>
    <select id="fClient" onchange="render()"><option value="all">All clients</option></select>
    <span class="filter-count" id="filterCount"></span>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Workflow</th>
          <th>Vendor</th>
          <th>Client</th>
          <th>Status</th>
          <th>Last Run</th>
          <th>Age</th>
          <th>Failure Reason</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="7">
          <div class="state-box">
            <div class="big">⬡</div>
            Paste your Apps Script URL above and click Load
          </div>
        </td></tr>
      </tbody>
    </table>
  </div>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <h3 id="modalTitle">Failure Details</h3>
      <pre id="modalBody"></pre>
      <div class="modal-actions">
        <button class="modal-btn" onclick="closeModal()">Close</button>
      </div>
    </div>
  </div>

  <script>
    const DAY_NAMES = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    let allData = [];

    // ── Load saved URL on startup
    window.addEventListener('DOMContentLoaded', () => {
      const saved = localStorage.getItem('dashboardUrl');
      const savedToken = localStorage.getItem('dashboardToken');
      if (saved) {
        document.getElementById('scriptUrl').value = saved;
        if (savedToken) document.getElementById('tokenInput').value = savedToken;
        loadData();
      }
    });

    function saveUrl() {
      const url = document.getElementById('scriptUrl').value.trim();
      const token = document.getElementById('tokenInput').value.trim();
      if (!url) return;
      localStorage.setItem('dashboardUrl', url);
      if (token) localStorage.setItem('dashboardToken', token);
      const notice = document.getElementById('savedNotice');
      notice.classList.add('show');
      setTimeout(() => notice.classList.remove('show'), 2000);
    }

    function relTime(iso) {
      if (!iso) return '—';
      const diff = Math.floor((Date.now() - new Date(iso)) / 1000);
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff/60) + 'm ago';
      if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
      return Math.floor(diff/86400) + 'd ago';
    }

    function fmtDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleDateString('en-US', {month:'short', day:'numeric'}) + ' ' +
             d.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
    }

    function schedLabel(w) {
      const h = w.scheduledHour;
      const hStr = h === 0 ? '12am' : h < 12 ? h+'am' : h === 12 ? '12pm' : (h-12)+'pm';
      if (w.scheduledDay === -1) return 'daily ' + hStr;
      return DAY_NAMES[w.scheduledDay] + ' ' + hStr;
    }

    function badge(status) {
      const s = (status || '').toLowerCase();
      if (s === 'completed')  return '<span class="badge badge-ok"><span class="dot"></span>Done</span>';
      if (s === 'failed')     return '<span class="badge badge-fail"><span class="dot"></span>Failed</span>';
      if (s === 'terminated') return '<span class="badge badge-warn"><span class="dot"></span>Terminated</span>';
      if (s === 'running')    return '<span class="badge badge-running"><span class="dot-pulse"></span>Running</span>';
      if (s === 'never_run' || s === 'stale') return '<span class="badge badge-gray"><span class="dot"></span>Not Run</span>';
      if (s === 'api_error')  return '<span class="badge badge-fail">API Error</span>';
      return '<span class="badge badge-gray">' + s + '</span>';
    }

    function ageColor(hours, status) {
      if (hours === null || hours === undefined) return 'var(--text3)';
      const s = (status || '').toLowerCase();
      if (s === 'completed' && hours < 48) return 'var(--green)';
      if (hours > 168) return 'var(--red)';
      if (hours > 72)  return 'var(--yellow)';
      return 'var(--text2)';
    }

    async function loadData() {
      const url = document.getElementById('scriptUrl').value.trim();
      if (!url) { alert('Please paste your Apps Script URL first.'); return; }
      const token = document.getElementById('tokenInput').value.trim();
      const fullUrl = token ? url + '?token=' + encodeURIComponent(token) : url;

      document.getElementById('loadSpinner').style.display = 'inline-block';
      document.getElementById('refreshSpinner').style.display = 'inline-block';
      document.getElementById('tbody').innerHTML = '<tr><td colspan="7"><div class="state-box"><span class="spinner" style="width:24px;height:24px;border-width:3px"></span><div style="margin-top:1rem">Loading 43 workflows from Skyvern…<br><span style="font-size:11px;color:var(--text3)">This takes ~20 seconds</span></div></div></td></tr>';

      try {
        const resp = await fetch(fullUrl);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const json = await resp.json();
        if (json.error) throw new Error(json.error);

        allData = json.workflows || [];
        const genAt = json.generatedAt ? new Date(json.generatedAt) : new Date();
        document.getElementById('updatedAt').textContent =
          'Updated ' + genAt.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});

        populateFilters();
        updateMetrics();
        render();
      } catch(err) {
        document.getElementById('tbody').innerHTML =
          '<tr><td colspan="7"><div class="state-box" style="color:var(--red)">Error: ' + err.message +
          '<br><span style="font-size:11px;color:var(--text3);margin-top:.5rem;display:block">Make sure the Web App is deployed with Execute as: Me and Who has access: Anyone</span></div></td></tr>';
      } finally {
        document.getElementById('loadSpinner').style.display = 'none';
        document.getElementById('refreshSpinner').style.display = 'none';
      }
    }

    function populateFilters() {
      const vendors = [...new Set(allData.map(w => w.vendor))].sort();
      const clients = [...new Set(allData.map(w => w.client))].sort();
      document.getElementById('fVendor').innerHTML =
        '<option value="all">All vendors</option>' + vendors.map(v => `<option>${v}</option>`).join('');
      document.getElementById('fClient').innerHTML =
        '<option value="all">All clients</option>' + clients.map(c => `<option>${c}</option>`).join('');
    }

    function updateMetrics() {
      let ok=0, fail=0, stale=0;
      allData.forEach(w => {
        const s = (w.status||'').toLowerCase();
        if (s === 'completed') ok++;
        else if (s === 'failed' || s === 'terminated') fail++;
        else stale++;
      });
      document.getElementById('m-total').textContent = allData.length;
      document.getElementById('m-ok').textContent    = ok;
      document.getElementById('m-fail').textContent  = fail;
      document.getElementById('m-stale').textContent = stale;
    }

    function render() {
      const fS = document.getElementById('fStatus').value;
      const fV = document.getElementById('fVendor').value;
      const fC = document.getElementById('fClient').value;

      let rows = allData.filter(w => {
        const s = (w.status||'').toLowerCase();
        if (fS !== 'all') {
          if (fS === 'stale' && s !== 'stale' && s !== 'never_run') return false;
          if (fS !== 'stale' && s !== fS) return false;
        }
        if (fV !== 'all' && w.vendor !== fV) return false;
        if (fC !== 'all' && w.client !== fC) return false;
        return true;
      });

      const order = {failed:0, api_error:1, terminated:2, running:3, stale:4, never_run:5, completed:6};
      rows.sort((a,b) => (order[(a.status||'').toLowerCase()]??9) - (order[(b.status||'').toLowerCase()]??9));

      document.getElementById('filterCount').textContent = rows.length + ' of ' + allData.length + ' workflows';

      if (!rows.length) {
        document.getElementById('tbody').innerHTML =
          '<tr><td colspan="7"><div class="state-box">No workflows match the current filters</div></td></tr>';
        return;
      }

      document.getElementById('tbody').innerHTML = rows.map(w => {
        const s = (w.status||'').toLowerCase();
        const hours = w.hoursSince;
        const ageStr = (hours !== null && hours !== undefined)
          ? (hours < 1 ? '<1h' : Math.round(hours) + 'h') : '—';
        const hasErr = w.failureReason && (s === 'failed' || s === 'terminated' || s === 'api_error');
        const reasonCell = hasErr
          ? `<button class="err-btn" onclick="showErr(${JSON.stringify(w.name)}, ${JSON.stringify(w.failureReason)})">${w.failureReason.substring(0,45)}${w.failureReason.length>45?'…':''}</button>`
          : `<span style="color:var(--text3);font-family:'IBM Plex Mono',monospace;font-size:11px">—</span>`;

        return `<tr>
          <td class="td-name">${w.name}</td>
          <td class="td-vendor">${w.vendor}</td>
          <td class="td-client">${w.client}</td>
          <td>${badge(w.status)}</td>
          <td class="td-time">${relTime(w.finishedAt)}<div class="td-sched">${schedLabel(w)}</div></td>
          <td class="td-age" style="color:${ageColor(hours,s)}">${ageStr}</td>
          <td class="td-reason">${reasonCell}</td>
        </tr>`;
      }).join('');
    }

    function showErr(name, reason) {
      document.getElementById('modalTitle').textContent = name;
      document.getElementById('modalBody').textContent = reason;
      document.getElementById('modalBackdrop').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modalBackdrop').classList.remove('open');
    }

    document.getElementById('modalBackdrop').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
  </script>
</body>
</html>
